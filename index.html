<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mak Synth</title>
<meta name="description" content="Mak Synth is a hands-on synthesizer kit for learning sound design, electronics, and music production.">

<style>
@font-face {
    font-family: "MakSynthFont";
    src: url("./synthekR_ldr%5B1%5D.ttf");
}

body {
    margin: 0;
    background: #ffffff;
    color: #111111;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* NAVIGATION */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #eaeaea;
    z-index: 1000;
}

.logo {
    font-family: "MakSynthFont";
    font-size: 30px;
    letter-spacing: 2px;
}

.nav-links {
    display: flex;
    gap: 35px;
}

.nav-links a {
    color: #111111;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s ease;
    font-size: 14px;
}

.nav-links a:hover {
    opacity: 1;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 100px 20px 40px;
    box-sizing: border-box;
}

.hero-content {
    max-width: 700px;
}

.hero h1 {
    font-family: "MakSynthFont";
    font-size: 72px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    font-weight: 400;
}

.hero p {
    font-size: 18px;
    color: #111111;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 25px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

/* HERO IMAGE STYLING */
.hero-image {
    width: 100%;
    max-width: 500px;
    height: auto;
    border-radius: 8px;
    margin-bottom: 30px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.button {
    display: inline-block;
    padding: 14px 26px;
    background: #111111;
    color: white;
    text-decoration: none;
    font-weight: 600;
    border-radius: 8px;
    transition: 0.2s ease;
}

.button:hover {
    opacity: 0.85;
}

/* MOBILE */
@media (max-width: 768px) {
    nav {
        padding: 0 16px;
    }

    .logo {
        font-size: 22px;
    }

    .nav-links {
        gap: 12px;
    }

    .nav-links a {
        font-size: 12px;
    }

    .hero h1 {
        font-size: 42px;
        letter-spacing: 2px;
    }

    .hero p {
        font-size: 16px;
        padding: 0 10px;
    }

    .hero-image {
        max-width: 90%;
        margin-bottom: 20px;
    }

    .button {
        padding: 12px 20px;
        font-size: 14px;
    }
}

</head>

<nav>
    <div class="logo">MAK SYNTH</div>

    <div class="nav-links">

        <a href="iterations.html">Iterations</a>
        <a href="files.html">Files</a>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">

        <h1>MAK SYNTH</h1>

        <p>
            A hands-on synthesizer kit for learning sound design,
            electronics, and music production.
        </p>

        <img class="hero-image" src="IMG_0055.JPG" alt="Mak Synth Kit">

        <a class="button" href="#">
            COMING SOON
        </a>

    </div>
</div>
