<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAK SYNTH</title>

  <style>
    @font-face {
      font-family: "MakSynthFont";
      src: url("./synthekR_ldr%5B1%5D.ttf");
    }

    body {
      margin: 0;
      background: #0b0b0d;
      color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-family: "MakSynthFont", Arial, sans-serif;
      font-size: 68px;
      margin-bottom: 20px;
      letter-spacing: 3px;
      font-weight: 400;
    }

    p {
      font-size: 18px;
      color: #cfcfcf;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      padding: 14px 26px;
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .button:hover {
      background: #e6e6e6;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>MAK SYNTH</h1>

    <p>
      A hands-on synthesizer kit for learning sound design, electronics, and music production.
    </p>

    <a class="button" href="#">
      COMING SOON
    </a>
  </div>
</body>
</html>
