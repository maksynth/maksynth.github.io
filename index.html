<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAK SYNTH</title>

  <style>
    /* Load custom font */
    @font-face {
      font-family: "MakSynthFont";
      src: url("./synthekR_ldr%5B1%5D.ttf");
    }

    body {
      margin: 0;
      font-family: "MakSynthFont", Arial, sans-serif;
      background: #0f0f10;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      color: #cccccc;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }

    .button:hover {
      background: #dddddd;
    }

    .small {
      margin-top: 40px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>MAK SYNTH</h1>

    <p>
      MakSynth is a DIY educational synthesizer kit designed to teach
      sound design, electronics, and music production through hands-on building.
    </p>

    <a class="button" href="#">
      View Assembly Guide (coming soon)
    </a>

    <p class="small">
      Built for classroom workshops and library learning programs.
    </p>
  </div>
</body>
</html>
